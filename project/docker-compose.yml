version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped

  api:
    build: .
    container_name: sql-gen-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434

    restart: unless-stopped
    volumes:
      - ./artifacts:/app/artifacts:ro

volumes:
  ollama-data:


